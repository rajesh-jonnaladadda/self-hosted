name: Self Hosted Demo

on:
  push:
    branches:
      - main

jobs:
  demo:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Print Message
        run: echo "Hello Rajesh"

      - name: Show Date
        run: date

      - name: Show Current Directory
        run: pwd

      - name: List Files
        run: ls -la